      회귀불연속설계(RDD)로 활용. 학급 규모 축소가 학업 성취도를 유의미하게
      개선. 한국 학급당 학생수 정책 평가의 핵심 방법론 논문.
      20~25명 학급 기준이 효과적임을 실증.

  - id: chetty_friedman_rockoff_2014_i
    title: "Measuring the Impacts of Teachers I: Evaluating Bias in Teacher Value-Added Estimates"
    authors: [Chetty, Friedman, Rockoff]
    year: 2014
    journal: AER
    topics: [teacher_quality, education_policy]
    tag: "📐"
    url: https://doi.org/10.1257/aer.104.9.2593
    summary: >
      교사 부가가치(Value-Added) 추정의 편의를 평가. 교사 배치의 준무작위성을
      활용해 VA 추정이 편의 없음을 확인. 양질의 교사는 학생의 장기적 노동
      시장 성과(소득, 대학 진학)에 유의미한 영향. 한국 교원 평가제 설계의 근거.

  - id: krueger_1999
    title: "Experimental Estimates of Education Production Functions"
    authors: [Krueger]
    year: 1999
    journal: QJE
    topics: [class_size_effects, education_policy]
    tag: "📐"
    url: https://doi.org/10.1162/003355399556052
    summary: >
      테네시 STAR 실험을 재분석. 소규모 학급(13-17명) 배정이 학업 성취도와
      장기 성과에 긍정적 효과. 특히 저소득층·소수집단 학생에게 효과가 큼.
      무작위 실험 기반으로 학급 규모 효과를 가장 엄밀하게 추정한 연구.

  - id: hoxby_2000
    title: "The Effects of Class Size on Student Achievement: New Evidence from Population Variation"
    authors: [Hoxby]
    year: 2000
    journal: QJE
    topics: [class_size_effects, education_policy]
    tag: "📐"
    url: https://doi.org/10.1162/00335530051136796
    summary: >
      학급 규모의 출생 코호트 크기 변이를 도구변수로 활용. Krueger와 달리
      학급 규모 효과가 미미하다는 결론. STAR 실험의 이월 효과(spill-over) 등
      잠재적 편의를 지적. 교육 투입 효과 논쟁의 핵심 대립 논문.

