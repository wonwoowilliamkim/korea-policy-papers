# Korea Policy Evaluation — Paper Database
# 한국 정책평가 연구 논문 데이터베이스
#
# 수록 기준:
#   🇰🇷 = 한국 데이터/정책 직접 분석
#   🌐 = 한국과 직접 비교 가능한 유사 정책 평가 (방법론 템플릿)
#   📐 = 한국 정책 평가에 핵심적인 방법론 논문
#
# 저널: AER, QJE, JPE, REStud, Econometrica, AEJ, JPubE, JEEA, REStat

papers:

  # ── 저출생 대응 정책 ────────────────────────────────────────────────────

  - id: milligan_2005
    title: "Subsidizing the Stork: New Evidence on Tax Incentives and Fertility"
    authors: [Milligan]
    year: 2005
    journal: JPE
    topics: [cash_transfers_fertility, fertility_policy]
    tag: "🌐"
    url: https://doi.org/10.1086/426014
    summary: >
      캐나다 퀘벡주의 출산 장려금(Allowance for Newborn Children, 1988년 도입)이
      출생률에 미친 인과적 효과를 DiD로 추정. 장려금이 클수록 출생 확률이
      유의미하게 증가. 3자녀에 대한 보조금(최대 C$8,000)이 가장 강한 효과.
      한국 출산장려금 정책 분석의 핵심 방법론 템플릿.

  - id: cohen_dehejia_romanov_2013
    title: "Financial Incentives and Fertility"
    authors: [Cohen, Dehejia, Romanov]
    year: 2013
    journal: REStud
    topics: [cash_transfers_fertility, fertility_policy]
    tag: "🌐"
    url: https://doi.org/10.1093/restud/rds03
    summary: >
      이스라엘 아동수당 시스템의 여러 차례 개혁을 자연실험으로 활용.
      수당 증가 시 출생률 상승, 삭감 시 하락. 추가 자녀에 대한 탄력성 약 0.04.
      수당 수준이 높을수록 특히 다산(多産) 가정에서 출생 반응이 큼.
      한국 아동수당·출산장려금 효과 분석의 직접 비교 사례.

  - id: dahl_moretti_2008
    title: "The Demand for Sons"
    authors: [Dahl, Moretti]
    year: 2008
    journal: QJE
    topics: [fertility_policy, quantity_quality_tradeoff]
    tag: "🌐"
    url: https://doi.org/10.1162/qjec.2008.123.3.1085
    summary: >
      아들 선호가 출생률과 가족 구조에 미치는 영향을 분석. 아들이 없는 가정에서
      추가 출산 확률이 높음. 한국의 역사적 남아선호와 성별 선택적 낙태를
      이해하는 데 직접 적용 가능한 연구. 성비 불균형과 출산율 변화의 연결고리.

  - id: becker_lewis_1973
    title: "On the Interaction between the Quantity and Quality of Children"
    authors: [Becker, Lewis]
    year: 1973
    journal: JPE
    topics: [quantity_quality_tradeoff, fertility_policy]
    tag: "📐"
    url: https://doi.org/10.1086/260166
    summary: >
      자녀 수(Quantity)와 자녀 질(Quality) 간의 근본적 상충관계를 이론화.
      소득이 증가하면 자녀 수는 줄고 자녀 1인당 투자는 늘어난다는 예측.
      한국의 극심한 저출생-높은 사교육비 패턴을 설명하는 핵심 이론 프레임.

  - id: aaronson_etal_2021
    title: "The Effect of Fertility on Mothers' Labor Supply over the Last Two Centuries"
    authors: [Aaronson, Dehejia, Jordan, Lee, Phelan, Stoye]
    year: 2021
    journal: AER
    topics: [fertility_policy, childcare_policy]
    tag: "🌐"
    url: https://doi.org/10.1257/aer.20180263
    summary: >
      200년에 걸친 데이터를 활용해 자녀 수가 여성 노동공급에 미치는 인과적
      효과를 추정. 쌍둥이와 성별 구성을 도구변수로 활용. 출산율 감소가
      여성 노동참여 증가에 기여. 한국의 여성 경력단절과 출생률 분석에 직접 관련.

  # ── 교육 정책 ─────────────────────────────────────────────────────────────

  - id: angrist_lavy_1999
    title: "Using Maimonides' Rule to Estimate the Effect of Class Size on Scholastic Achievement"
    authors: [Angrist, Lavy]
    year: 1999
    journal: QJE
    topics: [class_size_effects, education_policy, rdd_methods]
    tag: "📐"
    url: https://doi.org/10.1162/003355399556061
